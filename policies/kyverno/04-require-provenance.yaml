# Politique 4 — Exiger une ATTESTATION DE PROVENANCE (SLSA) valide.
# Signer ne suffit pas : on exige la preuve "d'où vient cette image" (qui/quoi/quand).
# Kyverno vérifie l'attestation de type slsaprovenance attachée à l'image.
#
# Deux variantes ci-dessous (comme la policy 03) :
#   (A) mode PAR CLÉ    → collez votre cosign.pub (Lab 2) [actif par défaut]
#   (B) mode KEYLESS    → exigez l'identité du workflow GitHub (Lab 5)  [décommentez]
# ➜ La variante (B) doit correspondre EXACTEMENT à COSIGN_IDENTITY / COSIGN_ISSUER
#   de votre .env (voir .env.example).
#
# BONUS (commenté) : on peut aussi vérifier des CONDITIONS sur le contenu de la provenance,
# p.ex. que le build vient bien de la branche main de votre dépôt.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-provenance-attestation
  annotations:
    policies.kyverno.io/title: Exiger l'attestation de provenance
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Refuse toute image sans attestation de provenance SLSA signée et valide.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verifier-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/sseey/scs-demo-app*"
          required: true
          attestations:
            - type: https://slsa.dev/provenance/v0.2
              # ---- (A) VARIANTE PAR CLÉ (désactivée) ----
              # attestors:
              #   - count: 1
              #     entries:
              #       - keys:
              #           publicKeys: |-
              #             -----BEGIN PUBLIC KEY-----
              #             COLLEZ_ICI_LE_CONTENU_DE_cosign.pub
              #             -----END PUBLIC KEY-----
              # ---- (B) VARIANTE KEYLESS (Lab 5) — ACTIVE ----
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        issuer: "https://token.actions.githubusercontent.com"
                        subject: "https://github.com/sseey/supply-chain-security-project/.github/workflows/supply-chain.yml@refs/heads/main"
                        rekor:
                          url: "https://rekor.sigstore.dev"
              # ---- BONUS : conditions sur le CONTENU de la provenance ----
              # conditions:
              #   - all:
              #       - key: "{{ buildType }}"
              #         operator: Equals
              #         value: "https://example.com/manual-local-build/v1"
