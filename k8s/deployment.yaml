# Déploiement de l'app — À DÉPLOYER PAR DIGEST (pas par tag).
# ➜ Remplacez l'image ci-dessous par VOTRE digest signé (sortie de `echo $DIGEST` au Lab 0/2),
#   ou utilisez `scripts/deploy.sh` qui fait cette substitution pour vous sans modifier ce fichier.
#    ex : ghcr.io/<votre-user>/scs-demo-app@sha256:abcd1234...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scs-demo-app
  namespace: app
  labels: { app: scs-demo-app }
spec:
  replicas: 2
  selector:
    matchLabels: { app: scs-demo-app }
  template:
    metadata:
      labels: { app: scs-demo-app }
    spec:
      containers:
        - name: app
          image: ghcr.io/sseey/scs-demo-app:cedb75aefbc00936c49e229e3e8c5f2086fb11d9
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001        # correspond à --uid 10001 / USER appuser dans app/Dockerfile
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            # readOnlyRootFilesystem interdit l'écriture partout ailleurs ; gunicorn a besoin
            # d'un répertoire temporaire inscriptible (tempfile.mkstemp du WorkerTmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
